# ============================================================
# deploy.yml — GitHub Actions CI/CD Pipeline (Azure)
# ============================================================
# Pipeline stages:
#   1. lint-and-test     — runs on every pull request
#   2. build-and-push    — builds Docker image, pushes to ACR
#   3. terraform-plan    — previews infrastructure changes
#   4. approve           — manual gate before production deploy
#   5. deploy            — terraform apply + Container App update
#   6. rollback          — manual trigger to redeploy previous tag
# ============================================================

name: CI/CD Pipeline — Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allow manual triggering (used by the rollback job)
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Image tag (git SHA) to roll back to"
        required: false

jobs:
  # ============================================================
  # STAGE 1 — Lint and Test
  # Runs on every pull request to main.
  # Failure blocks the PR from being merged.
  # ============================================================
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    # Only run on pull requests — not on direct pushes to main
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, mbstring, tokenizer, xml, ctype, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Copy example env and generate a key so artisan commands work
      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # PHPUnit uses SQLite in-memory (configured in phpunit.xml)
      # so no real database is needed in CI
      - name: Run PHPUnit tests
        run: php artisan test --stop-on-failure

      # Basic PHP syntax check across the entire app directory
      - name: Lint PHP syntax
        run: find app -name "*.php" | xargs php -l

  # ============================================================
  # STAGE 2 — Build and Push Docker Image
  # Runs on push to main (after a PR is merged).
  # Tags the image with the exact git commit SHA for traceability.
  # ============================================================
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    # Only run on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      # Pass the image tag to downstream jobs
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Short SHA (first 7 chars) is used as the image tag.
      # Short enough to be readable, specific enough to be unique.
      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  # ============================================================
  # STAGE 3 — Terraform Plan
  # Runs after the image is pushed.
  # Shows what infrastructure changes would be applied.
  # The plan output is posted as a PR comment if available.
  # ============================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # Save the plan file so the deploy job can apply it exactly
      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # ============================================================
  # STAGE 4 — Manual Approval Gate
  # A human must approve before anything reaches production.
  # The workflow pauses here and waits for approval in the
  # GitHub Actions UI (Actions → select run → Review deployments).
  # ============================================================
  approve:
    name: Approve Production Deploy
    runs-on: ubuntu-latest
    needs: terraform-plan

    # GitHub Environments with required reviewers creates the approval gate.
    # Set up: Settings → Environments → production → Required reviewers
    environment:
      name: production

    steps:
      - name: Approval confirmed
        run: echo "Deployment approved — proceeding to apply"

  # ============================================================
  # STAGE 5 — Deploy
  # Applies the saved Terraform plan (exact same plan that was
  # reviewed). Then updates the Container App to the new image.
  # Container Apps uses revision-mode=Multiple for zero-downtime
  # rolling deployment.
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, approve]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      

  # ============================================================
  # STAGE 6 — Rollback
  # Manually triggered via workflow_dispatch with a rollback_tag.
  # Redeploys a previous image tag — no build step needed because
  # the old image is still in ACR.
  # Example: trigger with rollback_tag = "a1b2c3d"
  # ============================================================
  rollback:
    name: Rollback to Previous Version
    runs-on: ubuntu-latest

    # Only runs when manually triggered with a rollback_tag input
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback_tag != ''

    # Rollback also requires production environment approval
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Confirm rollback
        run: |
          echo "Rollback to ${{ github.event.inputs.rollback_tag }} complete"
